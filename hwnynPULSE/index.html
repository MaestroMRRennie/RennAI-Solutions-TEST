<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Healthy with NYN — Blog Engine</title>
<link rel="icon" href="data:,">
<style>
:root {
  --dark-green: #2A7A4F;
  --mid-green: #3DA668;
  --light-green: #72C48A;
  --gold: #C8963E;
  --near-black: #111A14;
  --white: #FFFFFF;
  --bg-page: #F3F7F4;
  --border: #D4E5DB;
  --dark-green-tint: #EAF5EE;
  --mid-green-tint: #F0FAF3;
  --gold-tint: #FDF5E8;
  --gray-tint: #F4F4F4;
  --gray: #6B7B70;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg-page);
  min-height: 100vh;
  padding-bottom: 60px;
  color: var(--near-black);
}
button { transition: all 0.15s; font-family: Georgia, 'Times New Roman', serif; cursor:pointer; }
button:hover { opacity: 0.88; transform: translateY(-1px); }
button:active { transform: translateY(0); }
button:disabled { cursor: not-allowed; opacity: 0.6; }
input, textarea, select { font-family: Georgia, 'Times New Roman', serif; }
input:focus, textarea:focus, select:focus { outline:none; border-color: var(--mid-green) !important; box-shadow: 0 0 0 2px rgba(61,166,104,0.13); }
a { color: var(--mid-green); }

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* ── Header ───────────────────────────────────────────── */
.app-header {
  background: var(--dark-green);
  color: var(--white);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(42,122,79,0.35);
}
.app-header-left { display:flex; align-items:center; gap:14px; }
.app-header-logo { width:44px; height:44px; border-radius:8px; background:var(--dark-green); display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:4px; }
.app-header-eyebrow { font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:0.14em; margin-bottom:2px; font-weight:400; }
.app-header-title { font-size:18px; font-weight:700; letter-spacing:-0.01em; }
.app-header-title span { color: var(--gold); }
.app-header-right { display:flex; align-items:center; gap:16px; }
.app-header-date-label { font-size:10px; color:rgba(255,255,255,0.5); margin-bottom:2px; text-align:right; }
.app-header-date-value { font-size:11px; color:rgba(255,255,255,0.8); text-align:right; }

.key-btn {
  background: rgba(255,255,255,0.12); color: var(--white);
  border:1px solid rgba(255,255,255,0.25); border-radius:6px;
  padding:7px 14px; font-size:11px; font-weight:700;
}
.key-btn.unset { background: var(--gold); color: var(--near-black); border-color: var(--gold); }
.key-panel-wrap { position:relative; }
.key-panel {
  position:absolute; top:calc(100% + 8px); right:0; background:var(--white);
  border-radius:8px; padding:16px; width:320px; box-shadow:0 8px 24px rgba(0,0,0,0.25);
  z-index:50; border:1px solid var(--border);
}
.key-panel-label { font-size:11px; color:var(--near-black); font-weight:700; margin-bottom:6px; }
.key-panel-help { font-size:11px; color:var(--gray); line-height:1.6; margin-bottom:10px; }
.key-panel input { width:100%; font-size:12px; border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--near-black); margin-bottom:10px; font-family:'Courier New',monospace; }
.key-panel-actions { display:flex; justify-content:space-between; gap:8px; }
.btn-ghost { background:none; border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-size:11px; color:var(--gray); }
.btn-done { background:var(--dark-green); border:none; border-radius:6px; padding:6px 14px; font-size:11px; color:var(--white); font-weight:700; }

/* ── Tab bar ───────────────────────────────────────────── */
.tab-bar { background:var(--white); border-bottom:2px solid var(--border); padding:0 28px; display:flex; gap:0; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.tab-btn { padding:10px 20px; font-size:12px; font-weight:700; cursor:pointer; border:none; border-bottom:3px solid transparent; background:none; color:var(--gray); letter-spacing:0.02em; }
.tab-btn.active { border-bottom-color: var(--gold); color: var(--dark-green); }

.page-content { padding:24px 28px; }
.contacts-wrap { max-width:760px; }

/* ── Status bar ───────────────────────────────────────────── */
.status-bar { display:flex; gap:0; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.status-step { flex:1; padding:9px 4px; text-align:center; font-size:11px; font-weight:700; background:var(--white); color:var(--gray); border-right:1px solid var(--border); letter-spacing:0.02em; }
.status-step:last-child { border-right:none; }
.status-step.done { background: var(--mid-green-tint); color: var(--dark-green); }
.status-step.active { background: var(--dark-green); color: var(--white); }
.status-step.gated-pending { color: var(--mid-green); }

/* ── Error banner ───────────────────────────────────────────── */
.error-banner { background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.error-text { font-size:12px; color:#B91C1C; flex:1; }
.error-retry { background:#B91C1C; color:var(--white); border:none; border-radius:6px; padding:6px 14px; font-size:11px; font-weight:700; flex-shrink:0; }
.error-close { background:none; border:none; color:#F87171; font-size:18px; flex-shrink:0; line-height:1; padding:0; }

/* ── Grid layout ───────────────────────────────────────────── */
.workflow-grid { display:grid; grid-template-columns: 1fr 300px; gap:24px; }
@media (max-width: 860px) { .workflow-grid { grid-template-columns: 1fr; } }

/* ── Panel / Gate ───────────────────────────────────────────── */
.panel { background:var(--white); border-radius:8px; padding:24px; border:1px solid var(--border); margin-bottom:20px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
.panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.panel-step-label { font-size:10px; color:var(--gray); letter-spacing:0.08em; margin-bottom:4px; font-weight:700; }
.panel-title { font-size:15px; font-weight:700; color:var(--dark-green); }

.badge { display:inline-flex; align-items:center; gap:6px; border-radius:6px; padding:4px 10px; font-size:12px; font-weight:600; border:1px solid; }
.badge.small { gap:4px; padding:2px 7px; font-size:11px; }
.badge-icon { width:18px; height:18px; border-radius:4px; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.badge.small .badge-icon { width:14px; height:14px; font-size:9px; }

.gate { border-radius:12px; padding:24px; margin-bottom:20px; }
.gate-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.gate-icon { width:24px; height:24px; border-radius:6px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; }
.gate-eyebrow { font-size:11px; letter-spacing:0.08em; }
.gate-title { font-size:13px; font-weight:600; color:#1a1a18; }
.gate-approved { font-size:12px; font-family:'Courier New',monospace; }
.gate-body p { font-size:13px; color:var(--near-black); margin-bottom:12px; line-height:1.7; }
.gate-actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn-primary { color:var(--white); border:none; border-radius:6px; padding:10px 22px; font-size:12px; font-weight:700; letter-spacing:0.02em; }
.btn-outline { background:var(--white); border:1.5px solid; border-radius:6px; padding:10px 22px; font-size:12px; font-weight:700; }
.revision-label { font-size:11px; margin-bottom:8px; font-weight:700; letter-spacing:0.05em; }
textarea.gate-textarea { width:100%; min-height:80px; border-radius:6px; padding:10px 12px; font-size:12px; color:var(--near-black); background:var(--white); resize:vertical; margin-bottom:14px; border:1px solid; }
.btn-cancel { background:var(--white); border:1px solid var(--border); border-radius:6px; padding:10px 18px; font-size:12px; color:var(--gray); }

/* ── Topic scan ───────────────────────────────────────────── */
.scan-intro { font-size:13px; color:var(--gray); margin-bottom:18px; line-height:1.7; }
.focus-block { margin-bottom:18px; }
.focus-label { font-size:10px; color:var(--gray); letter-spacing:0.06em; margin-bottom:6px; font-weight:700; }
.focus-label .sub { font-weight:400; }
.focus-row { display:flex; gap:10px; align-items:center; }
.focus-row input { flex:1; font-size:13px; border:1px solid var(--border); border-radius:6px; padding:9px 12px; background:var(--white); color:var(--near-black); }
.focus-clear { background:none; border:none; color:var(--gray); font-size:18px; padding:0 4px; line-height:1; }
.focus-applied { font-size:11px; color:var(--dark-green); margin-top:6px; font-weight:600; }
.btn-go { background:var(--mid-green); color:var(--white); border:none; border-radius:6px; padding:10px 22px; font-size:12px; font-weight:700; letter-spacing:0.02em; }

.topic-card { border:1px solid var(--border); border-radius:8px; padding:14px 16px; cursor:pointer; background:var(--bg-page); margin-bottom:10px; transition: all 0.2s; }
.topic-card.selected { border:2px solid var(--dark-green); background:var(--dark-green-tint); }
.topic-card-inner { display:flex; align-items:flex-start; gap:12px; }
.topic-rank { width:28px; height:28px; border-radius:6px; background:var(--border); color:var(--gray); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.topic-card.selected .topic-rank { background:var(--dark-green); color:var(--white); }
.topic-title { font-weight:700; font-size:13px; color:var(--near-black); margin-bottom:4px; }
.topic-angle { font-size:12px; color:var(--gray); margin-bottom:6px; font-style:italic; }
.topic-tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
.tag.audience { background:var(--mid-green-tint); color:var(--mid-green); }
.tag.intent { background:var(--gold-tint); color:var(--gold); }
.topic-rationale { font-size:11px; color:var(--gray); margin-top:8px; }

/* ── Brief card ───────────────────────────────────────────── */
.brief-card { background:var(--bg-page); border-radius:8px; padding:20px; border:1px solid var(--border); }
.brief-eyebrow { font-size:11px; color:var(--mid-green); margin-bottom:4px; font-weight:700; letter-spacing:0.06em; }
.brief-title { font-size:16px; font-weight:700; color:var(--dark-green); margin-bottom:18px; }
.brief-row2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
.brief-label { font-size:11px; color:var(--gray); margin-bottom:6px; font-weight:700; }
.brief-value { font-size:13px; color:var(--near-black); }
.brief-kp { display:flex; gap:10px; margin-bottom:6px; }
.brief-kp-num { color:var(--dark-green); font-size:12px; flex-shrink:0; font-weight:700; }
.brief-source { font-size:12px; color:var(--dark-green); margin-bottom:4px; }
.kw-wrap { display:flex; flex-wrap:wrap; gap:4px; }
.kw-pill { font-size:10px; background:var(--gold-tint); color:var(--gold); padding:2px 8px; border-radius:4px; font-weight:600; }
.brief-cta { font-size:13px; color:var(--near-black); font-style:italic; }

/* ── Draft / rendered post ───────────────────────────────────────────── */
.draft-actions { display:flex; justify-content:flex-end; gap:8px; margin-bottom:12px; }
.copy-btn { background:var(--white); border:1px solid var(--border); border-radius:6px; padding:4px 12px; font-size:11px; font-weight:700; color:var(--gray); }
.copy-btn.copied { background:var(--mid-green-tint); border-color:var(--light-green); color:var(--dark-green); }
.stream-box { background:var(--bg-page); border-radius:6px; padding:16px; border:1px solid var(--border); margin-top:12px; font-size:14px; line-height:1.8; color:var(--near-black); white-space:pre-wrap; }
.stream-cursor { border-right:2px solid var(--mid-green); animation: blink 0.8s step-end infinite; }
.rendered-post { background:var(--white); border-radius:8px; padding:28px 32px; border:1px solid var(--border); max-height:600px; overflow-y:auto; }
.rendered-post h1 { font-size:22px; font-weight:700; color:var(--dark-green); margin:0 0 18px; line-height:1.3; border-bottom:3px solid var(--gold); padding-bottom:12px; }
.rendered-post h2 { font-size:17px; font-weight:700; color:var(--dark-green); margin:26px 0 10px; line-height:1.35; }
.rendered-post h3 { font-size:15px; font-weight:700; color:var(--near-black); margin:18px 0 8px; }
.rendered-post p { font-size:15px; line-height:1.8; color:var(--near-black); margin:0 0 14px; }
.rendered-post ul, .rendered-post ol { margin:0 0 16px 0; padding-left:22px; }
.rendered-post li { font-size:15px; line-height:1.75; color:var(--near-black); margin-bottom:5px; }
.rendered-post blockquote { border-left:3px solid var(--mid-green); margin:0 0 16px; padding-left:16px; color:var(--gray); font-style:italic; font-size:15px; line-height:1.7; }
.rendered-post strong { font-weight:700; color:var(--near-black); }

/* ── Citation report ───────────────────────────────────────────── */
.citation-box { border-radius:8px; padding:20px; margin-bottom:20px; }
.citation-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.citation-head-left { display:flex; align-items:center; gap:10px; }
.citation-icon { width:24px; height:24px; border-radius:6px; color:var(--white); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.citation-eyebrow { font-size:10px; letter-spacing:0.08em; font-weight:700; }
.citation-label { font-size:13px; font-weight:700; color:var(--near-black); }
.citation-risk-pill { font-size:11px; font-weight:700; color:var(--white); padding:3px 10px; border-radius:4px; }
.citation-summary { font-size:13px; color:var(--near-black); line-height:1.7; }
.citation-items-label { font-size:10px; color:var(--gray); letter-spacing:0.06em; margin-bottom:8px; font-weight:700; margin-top:14px; }
.citation-item { background:var(--white); border-radius:6px; padding:10px 12px; border:1px solid var(--border); margin-bottom:8px; }
.citation-item-type { font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; }
.citation-item-excerpt { font-size:12px; color:var(--near-black); font-style:italic; margin:6px 0; }
.citation-item-rec { font-size:12px; color:var(--gray); }
.citation-warning { font-size:11px; color:#D97706; margin-top:8px; font-weight:600; }

/* ── Distribution ───────────────────────────────────────────── */
.dist-tabs { display:flex; gap:0; margin-bottom:20px; border-radius:6px; overflow:hidden; border:1px solid var(--border); }
.dist-tab { padding:10px; text-align:center; font-size:12px; font-weight:700; cursor:pointer; flex:1; background:var(--bg-page); color:var(--gray); border-right:1px solid var(--border); }
.dist-tab:last-child { border-right:none; }
.dist-tab.active { background:var(--dark-green); color:var(--white); }

.field-card { background:var(--bg-page); border-radius:6px; padding:12px 14px; border:1px solid var(--border); margin-bottom:12px; }
.field-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.field-head-left { display:flex; align-items:center; }
.field-label { font-size:10px; color:var(--gray); letter-spacing:0.05em; font-weight:700; }
.field-value { font-size:13px; color:var(--near-black); line-height:1.65; white-space:pre-wrap; }
.field-value.mono { font-family:'Courier New',monospace; }
.field-value.large { font-size:14px; }
.field-links div { font-size:12px; color:var(--dark-green); margin-bottom:4px; }

.help-bubble { position:relative; display:inline-flex; align-items:center; margin-left:6px; }
.help-dot { width:15px; height:15px; border-radius:50%; background:var(--mid-green); color:var(--white); font-size:9px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; cursor:help; user-select:none; }
.help-tip { position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:var(--near-black); color:var(--white); font-size:11px; line-height:1.55; padding:9px 12px; border-radius:6px; width:240px; z-index:999; box-shadow:0 4px 16px rgba(0,0,0,0.2); display:none; }
.help-bubble.open .help-tip { display:block; }

.pitch-intro { font-size:13px; color:var(--gray); margin-bottom:14px; line-height:1.7; }
.pitch-generate-all { background:var(--dark-green); color:var(--white); border:none; border-radius:6px; padding:10px 18px; font-size:12px; font-weight:700; margin-bottom:20px; }
.pitch-card { border:1px solid var(--border); border-radius:8px; margin-bottom:12px; overflow:hidden; }
.pitch-card-head { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--bg-page); cursor:pointer; }
.pitch-card-left { display:flex; align-items:center; gap:12px; }
.pitch-dot { width:8px; height:8px; border-radius:50%; background:var(--border); flex-shrink:0; }
.pitch-dot.ready { background:var(--light-green); }
.pitch-pub-name { font-size:13px; font-weight:700; color:var(--near-black); }
.pitch-pub-meta { font-size:11px; color:var(--gray); margin-top:2px; }
.pitch-card-right { display:flex; align-items:center; gap:8px; }
.pitch-gen-btn { background:var(--mid-green-tint); color:var(--mid-green); border:1px solid rgba(61,166,104,0.27); border-radius:6px; padding:4px 12px; font-size:11px; font-weight:700; }
.pitch-ready-label { font-size:11px; color:var(--light-green); font-weight:700; }
.pitch-card-body { padding:16px; border-top:1px solid var(--border); background:var(--white); }
.pitch-subject { font-size:13px; color:var(--near-black); font-weight:600; margin-bottom:16px; padding:8px 12px; background:var(--bg-page); border-radius:6px; }
.pitch-body-text { font-size:13px; color:var(--near-black); line-height:1.8; white-space:pre-wrap; background:var(--bg-page); padding:14px 16px; border-radius:6px; border:1px solid var(--border); }
.pitch-send-to { margin-top:12px; font-size:11px; color:var(--gray); }
.pitch-empty { font-size:13px; color:#B91C1C; }
.pitch-placeholder { font-size:13px; color:var(--gray); font-style:italic; }

/* ── Done panel ───────────────────────────────────────────── */
.done-box { background:var(--dark-green); border-radius:8px; padding:28px; margin-bottom:20px; text-align:center; }
.done-check { font-size:28px; margin-bottom:8px; color:var(--gold); }
.done-title { font-size:16px; font-weight:700; color:var(--white); margin-bottom:8px; }
.done-sub { font-size:13px; color:rgba(255,255,255,0.75); margin-bottom:22px; line-height:1.6; }
.btn-restart { background:var(--gold); color:var(--white); border:none; border-radius:6px; padding:10px 22px; font-size:12px; font-weight:700; letter-spacing:0.02em; }

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar-card { background:var(--white); border-radius:8px; padding:16px; border:1px solid var(--border); position:sticky; top:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.sidebar-eyebrow { font-size:10px; color:var(--gray); letter-spacing:0.1em; margin-bottom:12px; font-weight:700; }
.log-scroll { max-height:360px; overflow-y:auto; }
.log-empty { font-size:12px; color:var(--gray); font-style:italic; }
.log-entry { margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--bg-page); }
.log-ts { font-size:10px; color:var(--gray); margin-bottom:4px; }
.log-msg { font-size:12px; color:var(--near-black); margin-top:5px; line-height:1.55; }
.dept-section { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.dept-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.dept-icon { width:16px; height:16px; border-radius:4px; color:var(--white); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; flex-shrink:0; }
.dept-name { font-size:11px; color:var(--near-black); font-weight:600; }

/* ── Contacts editor ───────────────────────────────────────────── */
.contacts-title { font-size:15px; font-weight:700; color:var(--dark-green); margin-bottom:6px; }
.contacts-intro { font-size:13px; color:var(--gray); margin-bottom:20px; line-height:1.7; }
.contact-card { border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; background:var(--white); }
.contact-card.inactive { background:var(--bg-page); opacity:0.65; }
.contact-row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.contact-label { font-size:10px; color:var(--gray); margin-bottom:5px; font-weight:700; }
.contact-card input[type=text], .contact-card input:not([type]) { width:100%; font-size:12px; border:1px solid var(--border); border-radius:6px; padding:7px 10px; background:var(--bg-page); color:var(--near-black); }
.contact-focus-row { margin-bottom:12px; }
.contact-bottom-row { display:flex; align-items:center; gap:14px; }
.contact-card select { font-size:11px; border:1px solid var(--border); border-radius:6px; padding:6px 8px; background:var(--bg-page); color:var(--near-black); }
.contact-active-label { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--gray); cursor:pointer; margin-top:16px; }
.contact-remove { margin-left:auto; margin-top:16px; background:none; border:none; color:#B91C1C; font-size:12px; font-weight:600; }

// ── JSON parsing helper (mirrors original pj()) ─────────────────────────────
function parseJsonLoose(raw) {
  if (!raw || typeof raw !== "string") throw new Error("Agent returned an empty response — try running this step again.");
  try { return JSON.parse(raw.replace(/```json\s*|```\s*/g, "").trim()); } catch(e) {}
  const objMatch = raw.match(/(\{[\s\S]*\})/);
  if (objMatch) { try { return JSON.parse(objMatch[1]); } catch(e) {} }
  const arrMatch = raw.match(/(\[[\s\S]*\])/);
  if (arrMatch) { try { return JSON.parse(arrMatch[1]); } catch(e) {} }
  const firstBrace = raw.search(/[{[]/);
  if (firstBrace !== -1) { try { return JSON.parse(raw.slice(firstBrace)); } catch(e) {} }
  console.error("parseJsonLoose() failed on raw output:", raw.slice(0, 500));
  throw new Error("Agent returned unexpected output — try running this step again. (If this keeps happening, the API may be under load.)");
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Anthropic API call (non-streaming and streaming) ────────────────────────
async function callAgent(ak, msg, stream, attempt) {
  attempt = attempt || 1;
  const a = AGENTS[ak];
  if (!state.apiKey) {
    state.err = "Add your Anthropic API key (top right) before running the workflow.";
    throw new Error("Missing API key.");
  }
  addLog(`${a.name} starting…`, ak);
  state.err = null;
  render();
  const maxTokens = TOKEN_BUDGETS[ak] || 1000;

  const controller = new AbortController();
  const TIMEOUT_MS = 90000;
  const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: ANTHROPIC_MODEL, max_tokens: maxTokens, system: a.prompt, messages: [{ role:"user", content: msg }], stream: !!stream }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error((e && e.error && e.error.message) || `API ${res.status}`); }

    if (!stream) {
      const d = await res.json();
      let t = "";
      for (const block of (d.content||[])) {
        if (block.type === "text") t += block.text || "";
        if (block.type === "tool_result" && Array.isArray(block.content)) {
          for (const inner of block.content) { if (inner.type === "text") t += inner.text || ""; }
        }
      }
      t = t.trim();
      addLog(`${a.name} done.`, ak);
      render();
      return t;
    }

    // Streaming path
    state.streamText = "";
    render();
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = "";
    const IDLE_TIMEOUT_MS = 20000;
    let idleTimer = null;
    let aborted = false;
    const resetIdleTimer = () => {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { aborted = true; reader.cancel(); }, IDLE_TIMEOUT_MS);
    };
    resetIdleTimer();
    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done || aborted) break;
        resetIdleTimer();
        for (const ln of dec.decode(value).split("\n")) {
          if (ln.startsWith("data: ")) {
            const d = ln.slice(6).trim();
            if (d === "[DONE]") { clearTimeout(idleTimer); break; }
            try {
              const p = JSON.parse(d);
              if (p.type === "content_block_delta" && p.delta && p.delta.text) {
                full += p.delta.text;
                state.streamText = full;
                updateStreamBoxOnly();
              }
            } catch(e) {}
          }
        }
      }
    } finally { clearTimeout(idleTimer); }

    if (aborted && full.length < 200) {
      if (attempt < 2) {
        addLog(`${a.name} stalled early — retrying…`, ak);
        state.streamText = ""; render();
        return callAgent(ak, msg, stream, attempt + 1);
      }
      throw new Error(`${a.name} stopped responding. Try again — the API may be under load.`);
    }
    if (aborted && full.length >= 200) {
      addLog(`${a.name} stream stalled but content looks complete. Review the output.`, ak);
      const lastChar = full.trimEnd().slice(-1);
      if (!['.','!','?','"'].includes(lastChar)) {
        full += "\n\n*(Note: the response may have been cut short. If the post looks incomplete, use \"Request changes\" to ask the Writer to complete it.)*";
        state.streamText = full;
      }
    }
    addLog(`${a.name} done.`, ak);
    render();
    return full;
  } catch(e) {
    clearTimeout(timeoutId);
    if (e.name === "AbortError") throw new Error(`${a.name} timed out after 90 seconds. The API may be under load — try again.`);
    throw e;
  }
}

// Lightweight DOM patch used during streaming so we don't re-render the whole
// tree (and lose scroll position / inputs) on every chunk.
function updateStreamBoxOnly() {
  const el = document.getElementById("stream-box-content");
  if (el) {
    el.textContent = state.streamText;
    const cursor = document.createElement("span");
    cursor.className = "stream-cursor";
    cursor.innerHTML = "&nbsp;";
    el.appendChild(cursor);
    el.scrollTop = el.scrollHeight;
  } else {
    // stream box not in DOM yet — fall back to full render
    render();
  }
}
// ── Markdown → HTML renderer (ported 1:1 from the RenderedPost React component) ──

function renderInline(text) {
  // Returns an HTML string with bold/italic/link patterns converted,
  // and all other text HTML-escaped.
  let remaining = text;
  let out = "";
  while (remaining.length > 0) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const italicMatch = remaining.match(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/);
    const linkMatch = remaining.match(/\[(.+?)\]\((.+?)\)/);
    const candidates = [boldMatch, italicMatch, linkMatch].filter(Boolean);
    if (candidates.length === 0) { out += escapeHtml(remaining); break; }
    let first = candidates[0];
    for (const c of candidates) { if (c.index < first.index) first = c; }
    if (first.index > 0) out += escapeHtml(remaining.slice(0, first.index));
    if (first === boldMatch) {
      out += `<strong>${escapeHtml(first[1])}</strong>`;
    } else if (first === italicMatch) {
      out += `<em>${escapeHtml(first[1])}</em>`;
    } else {
      out += `<a href="${escapeHtml(first[2])}" target="_blank" rel="noopener noreferrer">${escapeHtml(first[1])}</a>`;
    }
    remaining = remaining.slice(first.index + first[0].length);
  }
  return out;
}

function renderMarkdown(markdown) {
  if (!markdown) return "";
  const lines = markdown.split("\n");
  const elements = [];
  let listItems = [];
  let inNumberedList = false;

  const flushList = () => {
    if (!listItems.length) return;
    const tag = inNumberedList ? "ol" : "ul";
    elements.push(`<${tag}>${listItems.map(li=>`<li>${li}</li>`).join("")}</${tag}>`);
    listItems = []; inNumberedList = false;
  };

  lines.forEach(line => {
    if (line.startsWith("# ")) { flushList(); elements.push(`<h1>${renderInline(line.slice(2))}</h1>`); }
    else if (line.startsWith("## ")) { flushList(); elements.push(`<h2>${renderInline(line.slice(3))}</h2>`); }
    else if (line.startsWith("### ")) { flushList(); elements.push(`<h3>${renderInline(line.slice(4))}</h3>`); }
    else if (/^\d+\.\s/.test(line)) { inNumberedList = true; listItems.push(renderInline(line.replace(/^\d+\.\s/, ""))); }
    else if (line.startsWith("- ") || line.startsWith("* ")) { inNumberedList = false; listItems.push(renderInline(line.slice(2))); }
    else if (line.startsWith("> ")) { flushList(); elements.push(`<blockquote>${renderInline(line.slice(2))}</blockquote>`); }
    else if (line.trim() === "") { flushList(); }
    else { flushList(); elements.push(`<p>${renderInline(line)}</p>`); }
  });
  flushList();
  return elements.join("");
}

// ── Status bar ───────────────────────────────────────────────────────────────

function renderStatusBar() {
  const idx = STEP_ORDER.indexOf(state.step);
  return `<div class="status-bar">${STEPS.map((s,i)=>{
    const done = i < idx, active = s.id === state.step;
    let cls = "status-step";
    if (active) cls += " active"; else if (done) cls += " done"; else if (s.gated) cls += " gated-pending";
    const icon = s.gated ? "⬡ " : done ? "✓ " : active ? "▶ " : "○ ";
    return `<div class="${cls}">${icon}${escapeHtml(s.label)}</div>`;

// ── Gate 2: Post review ───────────────────────────────────────────────────────

function renderGate2() {

    else if (risk === "review") riskNote = `<span style="color:#D97706"> Review the flagged items before approving.</span>`;
    else if (risk === "clear") riskNote = `<span style="color:#16A34A"> Citation check is clear.</span>`;
    inner = `
    <div class="gate-body"><p>Read the draft above and review the citation check report.${riskNote}</p></div>
    <div id="gate2-mode-region">${renderGateActions(2, color)}</div>`;

  return `

      <div class="gate-icon" style="background:${color}">⬡</div>

// Shared gate action region — review buttons vs change-request textarea.
// `gateMode` tracks per-gate UI mode ("review" | "changes") in module state below.
const gateUi = { 1: { mode:"review" }, 2: { mode:"review" } };

function renderGateActions(num, color) {
  const mode = gateUi[num].mode;
  if (mode === "review") {
    return `
    <div class="gate-actions">
      <button class="btn-primary" style="background:${color}" data-action="approveGate" data-arg="${num}" ${state.loading?"disabled":""}>Approve ▶</button>

  }

  return `
  <div class="revision-label" style="color:${color}">${label}</div>
  <textarea class="gate-textarea" id="gate${num}-feedback" style="border-color:${color}66" placeholder="Describe the changes you want. Be as specific as you like — the agent will incorporate them and regenerate."></textarea>
  <div class="gate-actions">
    <button class="btn-primary" style="background:${color}" data-action="submitGateChanges" data-arg="${num}" ${state.loading?"disabled":""}>${state.loading?"Regenerating…":"Send changes — regenerate ▶"}</button>

  </div>`;
}

// ── Citation check report ───────────────────────────────────────────────────

function renderCitationReport() {
  if (!(state.citationReport && after("gate2"))) return "";
  const risk = state.citationReport.overallRisk;
  const C = {
    clear:  { bg:"#F0FAF3", border:"#72C48A44", badge:"#2A7A4F", label:"✓ No issues found" },
    review: { bg:"#FFFBEB", border:"#F59E0B44", badge:"#D97706", label:"⚠ Items to review" },
    flag:   { bg:"#FEF2F2", border:"#FECACA",   badge:"#B91C1C", label:"✕ Issues flagged — resolve before approving" },
  };
  const c = C[risk] || C.review;
  const issues = state.citationReport.issues || [];
  const typeColors = {
    unattributed_quote:  { bg:"#F0FAF3", color:"#3DA668" },
    unattributed_stat:   { bg:"#FEF2F2", color:"#B91C1C" },
    missing_reference:   { bg:"#EAF5EE", color:"#2A7A4F" },
  };
  const issuesHtml = issues.length ? `
    <div class="citation-items-label">ITEMS TO ADDRESS</div>
    ${issues.map(issue => {
      const tc = typeColors[issue.type] || { bg:"#F4F4F4", color:"#6B7B70" };
      return `
      <div class="citation-item">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="citation-item-type" style="background:${tc.bg};color:${tc.color}">${escapeHtml(String(issue.type||"").replace(/_/g," "))}</span>
        </div>
        <div class="citation-item-excerpt">"${escapeHtml(issue.excerpt||"")}"</div>
        <div class="citation-item-rec">→ ${escapeHtml(issue.recommendation||"")}</div>
      </div>`;
    }).join("")}
  ` : "";
  let warnings = "";
  if (issues.some(i=>i.type==="missing_reference") && !state.citationReport.referencesPresent) {
    warnings += `<div class="citation-warning">Sources are cited inline but no References section was found — add one at the end of the post.</div>`;
  }
  if (state.citationReport.referencesPresent && !state.citationReport.referencesComplete) {
    warnings += `<div class="citation-warning">References section present but may be incomplete — verify all inline citations are listed.</div>`;
  }
  return `
  <div class="citation-box" style="background:${c.bg};border:1px solid ${c.border}">
    <div class="citation-head">
      <div class="citation-head-left">
        <div class="citation-icon" style="background:${c.badge}">C</div>
        <div>
          <div class="citation-eyebrow" style="color:${c.badge}">CITATION CHECK — AUTOMATED AUDIT</div>
          <div class="citation-label">${c.label}</div>
        </div>
      </div>
      <span class="citation-risk-pill" style="background:${c.badge}">${escapeHtml(String(risk||"").toUpperCase())}</span>
    </div>
    <p class="citation-summary" style="margin-bottom:${issues.length?"14px":"0"}">${escapeHtml(state.citationReport.summary||"")}</p>
    ${issuesHtml}
    ${warnings}
  </div>`;
}

function renderPitchPanel() {

    html += `

            ${["Global","Global / US","Global / Trade","Asia Pacific","Southeast Asia","Europe","North America","Australia / NZ"].map(r=>`<option value="${escapeHtml(r)}" ${c.region===r?"selected":""}>${escapeHtml(r)}</option>`).join("")}
          </select>
        </div>
        <label class="contact-active-label">
          <input type="checkbox" ${c.active?"checked":""} data-action="toggleContactActive" data-arg="${c.id}" /> Active
        </label>
        <button class="contact-remove" data-action="removeContact" data-arg="${c.id}">remove</button>
      </div>
    </div>`).join("")}
    <button class="contact-add-btn" data-action="addContact">+ add publication</button>
  </div>`;
}
// ── Workflow logic ───────────────────────────────────────────────────────────

async function doTopicScan() {
  if (!state.apiKey) { state.err = "Add your Anthropic API key (top right) before running the workflow."; render(); return; }
  state.loading = true; state.retryFn = doTopicScan; render();
  try {
    addLog(state.focusPrompt ? `Trend Scout searching with focus: "${state.focusPrompt}"…` : "Trend Scout searching global health and wellness news…", "trendScout");
    const today = new Date().toLocaleDateString("en-GB");
    const year = new Date().getFullYear();
    const focus = state.focusPrompt.trim();

    const SEARCH_QUERIES = focus ? [
      `health wellness ${focus} news ${year}`,
      `${focus} nutrition supplement research ${year}`,
      `${focus} wellness industry trends ${year}`,
      `${focus} health science findings ${year}`,
      `${focus} consumer health trends ${year}`,
    ] : [
      `health wellness industry news ${year}`,
      `supplement nutrition research findings ${year}`,
      `gut health microbiome science ${year}`,
      `functional food ingredient trends ${year}`,
      `global wellness consumer trends ${year}`,
    ];

    const searchOne = async (q, idx) => {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 30000);
      try {
        addLog(`Searching (${idx+1}/5): ${q.slice(0,50)}…`, "trendScout"); render();
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": state.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({
            model: ANTHROPIC_MODEL, max_tokens: 800,
            tools: [{ type: "web_search_20250305", name: "web_search" }],
            messages: [{ role: "user", content: `Search for: ${q}. Summarise the top 3 most relevant results — headline, source name, and 1-2 sentence summary each.` }],
          }),
          signal: ctrl.signal,
        });
        clearTimeout(tid);
        if (!res.ok) return `SEARCH ${idx+1}: failed (${res.status})`;
        const data = await res.json();
        const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(" ").slice(0,600);
        addLog(`Search ${idx+1} complete.`, "trendScout"); render();
        return `SEARCH ${idx+1} (${q}):\n${text||"No results."}`;
      } catch(e) {
        clearTimeout(tid);
        const reason = e.name==="AbortError" ? "timed out" : e.message;
        addLog(`Search ${idx+1} ${reason} — skipping.`, "trendScout"); render();
        return `SEARCH ${idx+1}: unavailable (${reason})`;
      }
    };

    const summaries = [];
    for (let i = 0; i < SEARCH_QUERIES.length; i++) { summaries.push(await searchOne(SEARCH_QUERIES[i], i)); }
    const searchSummaries = summaries.join("\n\n");
    addLog("Search complete — generating topic ideas…", "trendScout"); render();

    const fallback = TOPIC_POOL.map((t,i) => `${i+1}. "${t.title}" | ${t.angle} | ${t.audience} | ${t.searchIntent}`).join("\n");
    const msg = `Today: ${today}${focus ? `\n\nEDITOR FOCUS FOR THIS SCAN: "${focus}" — prioritise topics within this area. All 5 topics should relate to this focus if the search results support it.` : ""}\n\nLIVE SEARCH RESULTS FROM HEALTH & WELLNESS SOURCES:\n${searchSummaries}\n\nFALLBACK TOPIC POOL (use only if search results contain nothing usable):\n${fallback}\n\nGenerate the 5 best blog topic ideas for today. These should serve the goal of positioning Healthy with NYN as a trusted, knowledgeable voice in the global health and wellness space — valuable to consumers, distributors, retailers, and practitioners alike. IMPORTANT: Your entire response must be a single raw JSON array starting with [ and ending with ]. No preamble, no explanation, no markdown. Just the JSON array.`;

    const raw = await callAgent("trendScout", msg);
    addLog(`Trend Scout raw (first 100 chars): ${raw.slice(0,100)}`, "trendScout");
    const stripped = raw.includes("[") ? raw.slice(raw.indexOf("[")) : raw;
    const ranked = parseJsonLoose(stripped);
    const enriched = ranked.map(r => Object.assign({}, TOPIC_POOL.find(t => t.title === r.title) || {}, r));
    state.topics = enriched;
    state.selected = enriched[0];
    addLog(`Top pick: "${(enriched[0]||{}).title}"`, null);
    state.step = "brief";
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doBrief() {
  state.loading = true; state.retryFn = doBrief; render();
  try {
    const raw = await callAgent("contentDirector", `Topic: "${state.selected.title}"\nAngle: ${state.selected.angle}\nAudience: ${state.selected.audience}\nIntent: ${state.selected.searchIntent}\n\nReturn ONLY a raw JSON object starting with { and ending with }. No preamble, no markdown.`);
    state.brief = parseJsonLoose(raw); state.step = "gate1";
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doReviseBrief(feedback) {
  state.loading = true; render();
  addLog(`Revising brief: "${feedback}"`, null); render();
  try {
    const current = JSON.stringify(state.brief, null, 2);
    const msg = `Here is the current content brief:\n${current}\n\nThe editor has requested these changes:\n${feedback}\n\nRevise the brief accordingly and return the complete updated brief. Return ONLY a raw JSON object starting with { and ending with }. Fields: workingTitle, targetAudience, keyPoints(array of 5), recommendedSources(array of 3), callToAction, estimatedReadTime, seoKeywords(array of 5). No preamble, no markdown.`;
    const raw = await callAgent("contentDirector", msg);
    state.brief = parseJsonLoose(raw);
    addLog("Brief revised and updated.", "contentDirector");
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doCitationCheck(postText) {
  addLog("Citation Checker auditing post…", "citationAgent"); render();
  try {
    const raw = await callAgent("citationAgent", `Audit this blog post for attribution and plagiarism risks. Return ONLY a raw JSON object starting with { and ending with }. No preamble, no markdown.\n\nPOST:\n${postText}`);
    const stripped = raw.includes("{") ? raw.slice(raw.indexOf("{")) : raw;
    const report = parseJsonLoose(stripped);
    state.citationReport = report;
    if (report.overallRisk === "clear") addLog("Citation check passed — no issues found.", "citationAgent");
    else if (report.overallRisk === "review") addLog(`Citation check: ${(report.issues||[]).length} item(s) to review before publishing.`, "citationAgent");
    else addLog(`Citation check: issues flagged — review required before approving.`, "citationAgent");
  } catch(e) { addLog("Citation check failed — review post manually before approving.", "citationAgent"); }
  render();
}

async function doRevisePost(feedback) {
  state.loading = true; state.citationReport = null; render();
  addLog(`Revising post: "${feedback}"`, null); render();
  try {
    const msg = `Here is the current draft blog post:\n\n${state.draft}\n\nThe editor has requested these changes:\n${feedback}\n\nRevise the post incorporating all requested changes. Keep what works — only change what was asked. Return the complete revised post. H1 = working title. ## for subheadings. Plain markdown. Follow all attribution rules: attribute all quotes and statistics inline, include a References section if any sources are cited.`;
    const text = await callAgent("writer", msg, true);
    state.draft = text;
    addLog("Post revised and updated.", "writer");
    await doCitationCheck(text);
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doDraft() {
  state.loading = true; state.retryFn = doDraft; state.draft = ""; state.citationReport = null; render();
  try {
    const b = state.brief;
    const msg = `Brief:\nTitle: ${b.workingTitle}\nAudience: ${b.targetAudience}\nKey points:\n${(b.keyPoints||[]).map((p,i)=>`${i+1}. ${p}`).join("\n")}\nSources: ${(b.recommendedSources||[]).join(", ")}\nCTA: ${b.callToAction}\nKeywords: ${(b.seoKeywords||[]).join(", ")}\nEditor note: ${state.note||"None"}\n\nWrite the full post now. Follow all attribution rules.`;
    const text = await callAgent("writer", msg, true);
    state.draft = text;
    addLog("Draft complete — running citation check…", "writer");
    await doCitationCheck(text);
    state.step = "gate2";
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doPublish() {
  state.loading = true; state.retryFn = doPublish; render();
  try {
    const b = state.brief;
    const raw = await callAgent("seoAgent", `Post:\n${state.draft}\n\nTitle: ${b.workingTitle}\nKeywords: ${(b.seoKeywords||[]).join(", ")}\n\nReturn ONLY a raw JSON object starting with { and ending with }. No preamble, no markdown.`);
    const stripped = raw.includes("{") ? raw.slice(raw.indexOf("{")) : raw;
    state.pub = parseJsonLoose(stripped); state.step = "done";
  } catch(e) { state.err = e.message; }
  finally { state.loading = false; render(); }
}

async function doPitch(cid) {
  state.pitchBusy = true; state.pitchBusyId = cid; render();
  const targets = cid === "all" ? state.contacts.filter(c=>c.active) : state.contacts.filter(c=>c.id===cid);
  for (const c of targets) {
    try {
      const msg = `Our blog post:\nTitle: ${state.brief?state.brief.workingTitle:""}\nExcerpt: ${state.pub?state.pub.cmsReadyExcerpt||"":""}\nOpening: ${state.draft.slice(0,300)}…\n\nPublication: ${c.name}\nRegion: ${c.region}\nFocus: ${c.focus}\n\nCompany: ${COMPANY_BIO}\n\nReturn ONLY a raw JSON object starting with { and ending with }. No preamble, no markdown.`;
      const raw = await callAgent("pitchAgent", msg);
      const stripped = raw.includes("{") ? raw.slice(raw.indexOf("{")) : raw;
      state.pitches[c.id] = parseJsonLoose(stripped);
      addLog(`Pitch ready for ${c.name}.`, null);
    } catch(e) { addLog(`Pitch failed for ${c.name}: ${e.message}`, null); }
    render();
  }
  state.pitchBusy = false; state.pitchBusyId = null; render();
}

function resetWorkflow() {
  state.step = "scan"; state.topics = null; state.selected = null; state.brief = null;
  state.draft = ""; state.pub = null; state.pitches = {}; state.note = ""; state.focusPrompt = "";
  state.citationReport = null; state.retryFn = null; state.log = []; state.streamText = ""; state.err = null;
  state.distTab = "own"; state.openPitchId = null;
  render();
}
// ── Focus preservation across re-renders ─────────────────────────────────────
// Since render() rebuilds innerHTML, a naive re-render while a text input is
// focused would steal focus and reset the cursor to the end. We snapshot the
// focused element's id + selection range beforehand and restore it afterward.

function captureFocus() {
  const el = document.activeElement;
  if (!el || !el.id) return null;
  if (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA") return null;
  let sel = null;
  try { sel = [el.selectionStart, el.selectionEnd]; } catch(e) {}
  return { id: el.id, sel };
}

function restoreFocus(info) {
  if (!info) return;
  const el = document.getElementById(info.id);
  if (!el) return;
  el.focus();
  if (info.sel && typeof el.setSelectionRange === "function") {
    try { el.setSelectionRange(info.sel[0], info.sel[1]); } catch(e) {}
  }
}

// ── Master render ─────────────────────────────────────────────────────────────

function render() {
  const root = document.getElementById("app");
  if (!root) return;
  const focusInfo = captureFocus();

  let html = renderHeader() + renderTabBar();
  html += `<div class="page-content">`;
  if (state.mainTab === "contacts") {
    html += renderContactsTab();
  } else {
    html += renderStatusBar();
    html += renderErrorBanner();
    html += `<div class="workflow-grid"><div>`;
    html += renderTopicScanPanel();
    html += renderBriefPanel();
    html += renderGate1();
    html += renderDraftPanel();
    html += renderCitationReport();
    html += renderGate2();
    html += renderDistributionPanel();
    html += renderDonePanel();
    html += `</div>`;
    html += renderSidebar();
    html += `</div>`;
  }
  html += `</div>`;
  root.innerHTML = html;

  restoreFocus(focusInfo);
  const logEl = document.getElementById("log-scroll");
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

// ── Copy-to-clipboard (targeted DOM update, no full render) ──────────────────

function cssAttrEscape(s) {
  return String(s).replace(/["\\]/g, "\\$&");
}

function updateCopyButtonUI(key) {
  document.querySelectorAll(`[data-copy-key="${cssAttrEscape(key)}"]`).forEach(btn => {
    const copied = state.copiedKey === key;
    btn.textContent = copied ? "✓ copied" : "copy";
    btn.classList.toggle("copied", copied);
  });
}

function fallbackCopy(text, cb) {
  const el = document.createElement("textarea");
  el.value = text;
  el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;";
  document.body.appendChild(el); el.focus(); el.select();
  try { document.execCommand("copy"); cb(); } catch(e) { console.error("Copy failed:", e); }
  document.body.removeChild(el);
}

function doCopyField(key) {
  const text = COPY_REGISTRY[key] || "";
  const finish = () => {
    state.copiedKey = key;
    updateCopyButtonUI(key);
    setTimeout(() => { if (state.copiedKey === key) { state.copiedKey = null; updateCopyButtonUI(key); } }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
  } else {
    fallbackCopy(text, finish);
  }
}

// ── Live UI updates that don't need a full render (typing feedback) ──────────

function updateFocusPromptLiveUI() {
  const preview = document.getElementById("focus-applied-preview");
  if (preview) {
    if (state.focusPrompt) {
      preview.style.display = "";
      preview.textContent = `▶ Scan will focus on: "${state.focusPrompt}"`;
    } else {
      preview.style.display = "none";
    }
  }
  const clearBtn = document.getElementById("focus-clear-btn");
  if (clearBtn) clearBtn.style.display = state.focusPrompt ? "" : "none";
}

function updateApiKeyButtonUI() {
  const btn = document.getElementById("api-key-toggle-btn");
  if (!btn) return;
  btn.textContent = state.apiKey ? "✓ API key set" : "⚠ Set API key";
  btn.classList.toggle("unset", !state.apiKey);
}

// ── Delegated input handler (keeps focus intact while typing) ───────────────

function handleInputEvent(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-bind");
  if (!bind) return;

  if (bind === "apiKey") {
    saveApiKey(el.value);
    updateApiKeyButtonUI();
    return;
  }
  if (bind === "focusPrompt") {
    state.focusPrompt = el.value;
    updateFocusPromptLiveUI();
    return;
  }
  if (bind === "note") {
    state.note = el.value;
    return;
  }
  if (bind.indexOf("contact:") === 0) {
    const parts = bind.split(":");
    const id = Number(parts[1]); const field = parts[2];
    const c = state.contacts.find(c => c.id === id);
    if (c) c[field] = el.value;
    return;
  }
}

// ── Delegated change handler (selects, checkboxes) ───────────────────────────

function handleChangeEvent(e) {
  const target = e.target.closest && e.target.closest("[data-action]");
  if (!target) return;
  const action = target.getAttribute("data-action");
  const arg = target.getAttribute("data-arg");

  if (action === "setContactRegion") {
    const id = Number(arg);
    const c = state.contacts.find(c => c.id === id);
    if (c) c.region = target.value;
    return;
  }
  if (action === "toggleContactActive") {
    const id = Number(arg);
    const c = state.contacts.find(c => c.id === id);
    if (c) c.active = target.checked;
    render();
    return;
  }
}

// ── Delegated click handler (everything else) ───────────────────────────────

function handleClickEvent(e) {
  const target = e.target.closest && e.target.closest("[data-action]");
  if (!target) return;
  const action = target.getAttribute("data-action");
  const arg = target.getAttribute("data-arg");

  switch (action) {
    case "toggleKeyPanel": state.showKeyPanel = !state.showKeyPanel; render(); break;
    case "clearApiKey": saveApiKey(""); render(); break;
    case "closeKeyPanel": state.showKeyPanel = false; render(); break;

    case "setMainTab": state.mainTab = arg; render(); break;

    case "copyField": doCopyField(arg); break;

    case "clearFocusPrompt": state.focusPrompt = ""; render(); break;
    case "runTopicScan": doTopicScan(); break;
    case "selectTopic":
      if (state.step === "brief" && state.topics) {
        const t = state.topics.find(t => t.title === arg);
        if (t) { state.selected = t; render(); }
      }
      break;

    case "runBrief": doBrief(); break;

    case "approveGate":
      if (arg === "1") {
        addLog("Brief approved — starting draft.", null);
        state.step = "draft"; gateUi[1].mode = "review"; render();
        doDraft();
      } else {
        addLog("Post approved — generating distribution package.", null);
        state.step = "publish"; gateUi[2].mode = "review"; render();
        doPublish();
      }
      break;
    case "startGateChanges": gateUi[Number(arg)].mode = "changes"; render(); break;
    case "cancelGateChanges": gateUi[Number(arg)].mode = "review"; render(); break;
    case "submitGateChanges": {
      const num = Number(arg);
      const ta = document.getElementById(`gate${num}-feedback`);
      const feedback = ta ? ta.value.trim() : "";
      if (!feedback) return;
      gateUi[num].mode = "review";
      if (num === 1) doReviseBrief(feedback); else doRevisePost(feedback);
      break;
    }

    case "resetWorkflow": resetWorkflow(); break;

    case "setDistTab": state.distTab = arg; render(); break;
    case "toggleHelp": {
      const bubble = document.getElementById(arg);
      if (bubble) bubble.classList.toggle("open");
      break;
    }
    case "togglePitchOpen": {
      const id = Number(arg);
      state.openPitchId = (state.openPitchId === id) ? null : id;
      render();
      break;
    }
    case "generatePitch":
      e.stopPropagation();
      doPitch(arg === "all" ? "all" : Number(arg));
      break;

    case "addContact":
      state.contacts.push({ id: Date.now(), contact:"", email:"", name:"", focus:"", region:"Global", active:true });
      render();
      break;
    case "removeContact":
      state.contacts = state.contacts.filter(c => c.id !== Number(arg));
      render();
      break;

    case "retryLast": { state.err = null; const fn = state.retryFn; if (fn) fn(); break; }
    case "dismissError": state.err = null; render(); break;
  }
}

// ── Wire up delegated listeners once, then do the first render ──────────────

document.addEventListener("click", handleClickEvent);
document.addEventListener("change", handleChangeEvent);
document.addEventListener("input", handleInputEvent);

render();
</script>
